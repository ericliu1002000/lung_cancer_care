{% load static %}
<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
      body {
        touch-action: manipulation;
        -ms-touch-action: manipulation;
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
    <title>{% block title %}肺部康复管理系统{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    {% include "layouts/partials/third_party_assets.html" %}
    <script>
      (function preloadCoreAssets() {
        function ensureHtmx() {
          if (!window.LCCAssetLoader || typeof window.LCCAssetLoader.ensure !== 'function') {
            if (typeof console !== 'undefined' && console.error) {
              console.error('[LCCAssetLoader] core asset loader is unavailable');
            }
            return;
          }
          window.LCCAssetLoader.ensure('htmx').catch(function () {
            if (typeof console !== 'undefined' && console.error) {
              console.error('[LCCAssetLoader] failed to preload htmx');
            }
          });
        }

        function ensureAlpineStack() {
          if (!window.LCCAssetLoader || typeof window.LCCAssetLoader.ensureMany !== 'function') {
            if (typeof console !== 'undefined' && console.error) {
              console.error('[LCCAssetLoader] core asset loader is unavailable');
            }
            return;
          }
          window.LCCAssetLoader.ensureMany(['alpineCollapse', 'alpine']).catch(function () {
            if (typeof console !== 'undefined' && console.error) {
              console.error('[LCCAssetLoader] failed to preload alpine assets');
            }
          });
        }

        // htmx must be available before/around DOMReady, otherwise hx-* triggers may never bind.
        ensureHtmx();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureAlpineStack, { once: true });
          return;
        }
        ensureAlpineStack();
      })();
    </script>
    <script>
      (function installHtmxAlpineLifecycleBridge() {
        if (window.__htmxAlpineLifecycleBridgeInstalled) return;
        window.__htmxAlpineLifecycleBridgeInstalled = true;

        function isElement(node) {
          return !!(node && node.nodeType === 1);
        }

        var alpineMutationObserverPaused = false;

        function getAlpine() {
          return window.Alpine || null;
        }

        function logLifecycleWarning(message, error) {
          if (typeof console !== 'undefined' && console.warn) {
            console.warn('[LCCAssetLoader] ' + message, error);
          }
        }

        function isKnownAlpineCleanupRace(error) {
          var message = error && error.message ? error.message : String(error || '');
          return message.indexOf('Cannot convert undefined or null to object') !== -1;
        }

        function eachElementInTree(target, callback) {
          if (!isElement(target)) return;
          callback(target);
          target.querySelectorAll('*').forEach(callback);
        }

        function prepareAlpineTreeForDestroy(target) {
          eachElementInTree(target, function (node) {
            if (node._x_prevKeys && (node._x_lookup === undefined || node._x_lookup === null)) {
              node._x_lookup = {};
            }
          });
        }

        function pauseAlpineMutations(Alpine) {
          if (!Alpine || alpineMutationObserverPaused || typeof Alpine.stopObservingMutations !== 'function') return;
          try {
            Alpine.stopObservingMutations();
            alpineMutationObserverPaused = true;
          } catch (error) {
            logLifecycleWarning('alpine stopObservingMutations failed', error);
          }
        }

        function resumeAlpineMutations(Alpine) {
          if (!Alpine || !alpineMutationObserverPaused || typeof Alpine.startObservingMutations !== 'function') return;
          try {
            Alpine.startObservingMutations();
          } catch (error) {
            logLifecycleWarning('alpine startObservingMutations failed', error);
          } finally {
            alpineMutationObserverPaused = false;
          }
        }

        function destroyAlpineTree(target, Alpine) {
          if (!isElement(target) || !Alpine || typeof Alpine.destroyTree !== 'function') return;
          try {
            prepareAlpineTreeForDestroy(target);
            Alpine.destroyTree(target);
          } catch (error) {
            if (!isKnownAlpineCleanupRace(error)) {
              logLifecycleWarning('alpine destroyTree failed', error);
            }
          }
        }

        function initAlpineTree(target, Alpine) {
          if (!isElement(target) || !Alpine || typeof Alpine.initTree !== 'function') return;
          if (!document.documentElement.contains(target)) return;
          try {
            Alpine.initTree(target);
          } catch (error) {
            logLifecycleWarning('alpine initTree failed', error);
          }
        }

        document.addEventListener('htmx:beforeSwap', function (event) {
          var Alpine = getAlpine();
          if (!Alpine) return;
          var target = event.detail && event.detail.target ? event.detail.target : event.target;
          pauseAlpineMutations(Alpine);
          destroyAlpineTree(target, Alpine);
        });

        document.addEventListener('htmx:afterSwap', function (event) {
          var Alpine = getAlpine();
          if (!Alpine) return;
          var target = event.detail && event.detail.target ? event.detail.target : event.target;
          try {
            initAlpineTree(target, Alpine);
          } finally {
            resumeAlpineMutations(Alpine);
          }
        });
      })();
    </script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-gray-100 text-gray-800">
    {% block body %}{% endblock %}
  </body>
</html>
