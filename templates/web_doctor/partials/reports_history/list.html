{% load static %}
<div class="bg-white min-h-screen p-3 relative"
     x-data="{
        activeTab: '{{ active_tab|default:'records' }}',
        showPreview: false,
        previewImage: '',
        openPreview(url) {
            if (!url) return;
            this.previewImage = url;
            this.showPreview = true;
        },
        closePreview() {
            this.showPreview = false;
            window.setTimeout(() => {
                if (!this.showPreview) this.previewImage = '';
            }, 200);
        },
        requestClosePreview() {
            window.dispatchEvent(new CustomEvent('close-preview'));
        }
     }"
     @show-preview.window="if ($root.contains($event.target)) openPreview($event.detail)"
     @close-preview.window="closePreview()"
     @keydown.escape.window="requestClosePreview()">
    <style>
        #reports-section-loading {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }
        #reports-section-loading.htmx-request {
            opacity: 1;
            pointer-events: auto;
        }
    </style>

    {# 局部 Loading 遮罩 #}
    <div id="reports-section-loading" class="htmx-indicator absolute inset-0 z-10 bg-white/80 backdrop-blur-sm flex items-center justify-center rounded-lg">
        <div class="flex flex-col items-center gap-3">
            <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm font-medium text-slate-600">加载中...</span>
        </div>
    </div>

    {# 顶部 Tab 切换 #}
    <div class="flex items-center justify-center gap-12 border-b border-slate-100 mb-6">
        <button 
            @click="activeTab = 'records'"
            hx-get="{% url 'web_doctor:patient_workspace_section' patient.id 'reports' %}?tab=records&fragment=content"
            hx-target="#reports-history-content"
            hx-swap="innerHTML"
            hx-indicator="#reports-section-loading"
            hx-disabled-elt="this"
            class="pb-3 px-2 text-base font-medium transition-all relative disabled:opacity-50 disabled:cursor-wait"
            :class="activeTab === 'records' ? 'text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'"
        >
            诊疗记录
            <div x-show="activeTab === 'records'" class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-600 rounded-full"></div>
        </button>
        <button 
            @click="activeTab = 'images'"
            hx-get="{% url 'web_doctor:patient_workspace_section' patient.id 'reports' %}?tab=images&fragment=content"
            hx-target="#reports-history-content"
            hx-swap="innerHTML"
            hx-indicator="#reports-section-loading"
            hx-disabled-elt="this"
            class="pb-3 px-2 text-base font-medium transition-all relative disabled:opacity-50 disabled:cursor-wait"
            :class="activeTab === 'images' ? 'text-slate-800 font-bold' : 'text-slate-500 hover:text-slate-700'"
        >
            图片档案
            <div x-show="activeTab === 'images'" class="absolute bottom-0 left-0 w-full h-0.5 bg-indigo-600 rounded-full"></div>
        </button>
    </div>

    {# 内容区域 #}
    <div id="reports-history-content" class="px-2 min-h-[400px]">
        {% include reports_content_template %}
    </div>

    <div id="reports-modal-host"></div>

    {# 图片预览弹窗 #}
    <template x-teleport="body">
        <div 
            x-show="showPreview" 
            class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4"
            @click.self="requestClosePreview()"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            style="display: none;"
        >
            <button
                type="button"
                aria-label="关闭图片预览"
                @pointerdown.stop.prevent="requestClosePreview()"
                @click.stop.prevent="requestClosePreview()"
                class="fixed top-4 right-4 z-[10001] inline-flex h-15 w-15 items-center justify-center rounded-full bg-black/40 text-white transition-colors hover:bg-black/60 hover:text-slate-200"
            >
                <svg class="w-12 h-12 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="relative max-w-4xl max-h-full">
                <img :src="previewImage" class="max-w-full max-h-[90vh] rounded shadow-2xl object-contain">
            </div>
        </div>
    </template>

    <template x-teleport="body">
      <div id="consultation-delete-modal" class="fixed inset-0 hidden z-[10000] bg-black/50">
        <div class="min-h-screen flex items-center justify-center p-4">
          <div class="bg-white rounded-2xl w-full max-w-[320px] p-6 shadow-2xl flex flex-col items-center">
            <div class="w-12 h-12 rounded-full bg-red-100 text-red-500 flex items-center justify-center mb-4">
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2 text-center">是否删除此条档案？</h3>
            <p class="text-sm text-slate-500 text-center mb-6 leading-relaxed">删除后数据无法恢复，请谨慎操作。</p>
            <div class="flex gap-3 w-full">
              <button id="consultation-delete-cancel-btn" type="button" class="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 font-bold active:bg-slate-50 transition">
                取消
              </button>
              <button id="consultation-delete-confirm-btn" type="button" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-bold shadow-lg shadow-red-200 active:scale-95 transition">
                确定
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>
</div>

{# OOB Update Tab Status #}
{% if include_workspace_tabs_oob %}
{% include "web_doctor/partials/patient_workspace_tabs.html" with oob=True active_tab="reports" %}
{% endif %}
<script src="{% static 'web_doctor/reports_history.js' %}"></script>
