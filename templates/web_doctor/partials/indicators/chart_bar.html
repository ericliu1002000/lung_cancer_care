<div class="bg-white p-4 rounded-lg shadow-sm">
  <div class="flex items-center gap-2 mb-4">
    {% include "components/ui/questionnaire_icon.html" with icon_key=chart.icon_key color=chart.color size_class="w-6 h-6" %}
    <h3 class="font-medium text-slate-800">{{ chart.title }}</h3>
    {% if chart.subtitle %}<span class="text-sm text-slate-500 font-medium">{{ chart.subtitle }}</span>{% endif %}
  </div>
  <div id="{{ chart.id }}" style="width: 100%; height: 250px;"></div>
</div>

{{ chart|json_script:chart.data_script_id }}
<script>
  (function () {
    const configNode = document.getElementById('{{ chart.data_script_id|escapejs }}');
    if (!configNode) return;
    const config = JSON.parse(configNode.textContent);
    const seriesData = (config.series || []).map(function (series) {
      return {
        name: series.name,
        type: 'line',
        smooth: true,
        connectNulls: true,
        symbol: 'circle',
        symbolSize: 8,
        itemStyle: { color: series.color },
        data: series.data,
        missing: series.missing || []
      };
    });
    let retryCount = 0;
    function initChart() {
      if (typeof echarts === 'undefined') {
        if (window.LCCCharts && typeof window.LCCCharts.ensureEcharts === 'function') {
          window.LCCCharts.ensureEcharts().then(initChart).catch(function () {});
        } else if (retryCount++ < 20) {
          setTimeout(initChart, 100);
        }
        return;
      }
      const chartDom = document.getElementById(config.id);
      if (!chartDom) return;
      const existingChart = echarts.getInstanceByDom(chartDom);
      if (existingChart) existingChart.dispose();
      const chart = echarts.init(chartDom);
      const option = {
        tooltip: {
          trigger: 'axis',
          formatter: function (params) {
            if (!params || !params.length) return '';
            const lines = [params[0].axisValue];
            params.forEach(function (param) {
              const series = seriesData[param.seriesIndex] || {};
              const value = param.value;
              const missing = (series.missing || [])[param.dataIndex] === 1;
              lines.push(param.marker + ' ' + param.seriesName + ': ' + (missing || value === null || value === undefined ? '-' : value));
            });
            return lines.join('<br>');
          }
        },
        legend: { data: seriesData.map(function (item) { return item.name; }), top: 0, right: 0 },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '15%', containLabel: true },
        xAxis: { type: 'category', boundaryGap: false, data: config.dates },
        yAxis: { type: 'value', min: config.y_min, max: config.y_max },
        series: seriesData
      };
      if ((config.dates || []).length > 30) {
        option.dataZoom = [{ type: 'slider', start: 0, end: 40 }, { type: 'inside', start: 0, end: 40 }];
        option.grid.bottom = '12%';
      }
      chart.setOption(option);
      window.addEventListener('resize', function () { chart.resize(); });
    }
    initChart();
  })();
</script>
