<div class="bg-white p-4 rounded-lg shadow-sm ">
    <div class="flex items-center gap-2 mb-4">
        <div>
            <h3 class="font-medium text-slate-800">{{ chart.title }}</h3>
        </div>
    </div>

    <div id="{{ chart.id }}" style="width: 100%; height: 250px;"></div>
</div>

<script>
    (function() {
        var chartId = '{{ chart.id|escapejs }}';
        var chartData = {% if chart.dates_json %}{{ chart.dates_json|safe }}{% else %}{{ chart.dates|safe }}{% endif %};
        var seriesData = [
            {% for s in chart.series %}
            {
                name: '{{ s.name|escapejs }}',
                type: 'line',
                smooth: true,
                connectNulls: false,
                symbol: 'circle',
                symbolSize: 6,
                itemStyle: {
                    color: '{{ s.color }}'
                },
                data: {% if s.data_json %}{{ s.data_json|safe }}{% else %}{{ s.data|safe }}{% endif %}{% if s.baseline %},
                markLine: {
                    silent: true,
                    symbol: ['none', 'none'],
                    lineStyle: {
                        type: 'dashed',
                        width: 1,
                        opacity: 0.6,
                        color: '{{ s.color }}'
                    },
                    label: {
                        show: false
                    },
                    data: [
                        { yAxis: {{ s.baseline }} }
                    ]
                }{% endif %}
            },
            {% endfor %}
        ];
        var yMin = {{ chart.y_min }};
        var yMax = {{ chart.y_max }};
        var maxRetries = 20;
        var retryCount = 0;

        function initChart() {
            if (typeof echarts === 'undefined') {
                if (window.LCCCharts && typeof window.LCCCharts.ensureEcharts === 'function') {
                    window.LCCCharts.ensureEcharts().then(initChart).catch(function () {
                        console.error('ECharts library not loaded.');
                    });
                    return;
                }
                if (retryCount < maxRetries) {
                    retryCount++;
                    setTimeout(initChart, 100);
                } else {
                    console.error('ECharts library not loaded.');
                }
                return;
            }

            var chartDom = document.getElementById(chartId);
            if (!chartDom) return;

            var myChart = echarts.init(chartDom);
            var option = {
                tooltip: {
                    trigger: 'axis'
                },
                legend: {
                    data: seriesData.map(function(item) { return item.name; }),
                    top: 0,
                    right: 0,
                    icon: 'circle',
                    itemWidth: 8,
                    itemHeight: 8,
                    textStyle: {
                        fontSize: 12,
                        color: '#64748b'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: chartData,
                    axisLine: {
                        lineStyle: {
                            color: '#94a3b8'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    min: yMin,
                    max: yMax,
                    axisLine: {
                        show: false
                    },
                    axisTick: {
                        show: false
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#f1f5f9'
                        }
                    }
                },
                series: seriesData
            };

            if (chartData.length > 60) {
                option.dataZoom = [
                    {
                        type: 'slider',
                        show: true,
                        xAxisIndex: [0],
                        start: 0,
                        end: 30,
                        bottom: 0,
                        height: 20
                    },
                    {
                        type: 'inside',
                        xAxisIndex: [0],
                        start: 0,
                        end: 30
                    }
                ];
                option.grid.bottom = '12%';
            }

            myChart.setOption(option);
            window.addEventListener('resize', function() {
                myChart.resize();
            });
        }

        initChart();
    })();
</script>
