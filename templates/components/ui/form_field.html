<div class="space-y-1.5 {{ extra_class|default:'' }}" {{ attrs|default:""|safe }}>
  {% if field.label %}
    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700">
      {{ field.label }}
      {% if field.field.required %}<span class="text-rose-500">*</span>{% endif %}
    </label>
  {% endif %}
  {{ field }}
  {% if field.help_text %}<p class="text-xs leading-5 text-slate-500">{{ field.help_text }}</p>{% endif %}
  {% if field.errors %}
    <div class="space-y-1 text-xs leading-5 text-rose-600">
      {% for error in field.errors %}<p>{{ error }}</p>{% endfor %}
    </div>
  {% endif %}
</div>
