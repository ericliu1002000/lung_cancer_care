<div class="bg-white rounded-xl border border-slate-200 p-3">
    <div id="health-record-line-chart" style="width: 100%; height: 75vh; min-height: 520px;"></div>
</div>

<script>
    (function () {
        const payload = JSON.parse('{{ chart_payload_json|escapejs }}');
        const recordType = '{{ record_type|default:""|escapejs }}';
        const questionnaireTypes = new Set([
            'physical',
            'breath',
            'cough',
            'appetite',
            'pain',
            'sleep',
            'psych',
            'anxiety'
        ]);

        function resolveTooltipUnit(type) {
            if (type === 'temperature') return '(°C)';
            if (type === 'spo2') return '(%)';
            if (type === 'weight') return '(Kg)';
            if (type === 'bp') return '(mmHg)';
            if (type === 'heart') return '(次/分钟)';
            if (type === 'step') return '(步)';
            if (questionnaireTypes.has(type)) return '(评分)';
            return '';
        }

        window.renderHealthRecordLineChart = function () {
            const chartDom = document.getElementById('health-record-line-chart');
            if (!chartDom) return;
            if (typeof echarts === 'undefined') {
                if (window.LCCCharts && typeof window.LCCCharts.ensureEcharts === 'function') {
                    window.LCCCharts.ensureEcharts().then(function () {
                        window.renderHealthRecordLineChart();
                    }).catch(function () {
                        if (typeof console !== 'undefined' && console.error) {
                            console.error('ECharts library not loaded.');
                        }
                    });
                }
                return;
            }

            // 当前数据源是“月底 -> 月初”，这里倒序成“1号 -> 月底”
            const dates = [...(payload.dates || [])];
            const normalizedSeries = (payload.series || []).map(item => ({
                ...item,
                data: [...(item.data || [])]
            }));

            const visibleDays = 8;
            const endValue = Math.max(Math.min(visibleDays - 1, dates.length - 1), 0);
            const showSlider = dates.length > visibleDays;

            const numericValues = normalizedSeries
                .flatMap(item => item.data || [])
                .map(value => {
                    if (value && typeof value === 'object' && !Array.isArray(value)) {
                        const raw = Array.isArray(value.value) ? value.value[0] : value.value;
                        return Number(raw);
                    }
                    return Number(value);
                })
                .filter(value => Number.isFinite(value));

            let xMax = 100;
            if (numericValues.length > 0) {
                xMax = Math.max(...numericValues);
                if (xMax <= 0) {
                    xMax = 1;
                } else {
                    const pad = xMax * 0.1;
                    xMax += 1;
                    xMax += pad;
                }
            }

            let chart = echarts.getInstanceByDom(chartDom);
            if (!chart) {
                chart = echarts.init(chartDom);
            }

            const series = normalizedSeries.map(item => {
                const orderedValues = item.data || [];
                const points = dates.map((dateLabel, idx) => {
                    const value = orderedValues[idx];
                    if (value && typeof value === 'object' && !Array.isArray(value)) {
                        const raw = Array.isArray(value.value) ? value.value[0] : value.value;
                        const parsed = Number(raw);
                        const normalizedValue = Number.isFinite(parsed) ? parsed : 0;
                        const rawValue = value.raw_value;
                        return {
                            ...value,
                            raw_value: rawValue === undefined ? normalizedValue : rawValue,
                            value: [normalizedValue, dateLabel]
                        };
                    }
                    if (value === null || value === undefined || value === '-') {
                        return {
                            value: [0, dateLabel],
                            raw_value: 0,
                            is_no_task: false
                        };
                    }
                    const parsed = Number(value);
                    const normalizedValue = Number.isFinite(parsed) ? parsed : 0;
                    return {
                        value: [normalizedValue, dateLabel],
                        raw_value: normalizedValue,
                        is_no_task: false
                    };
                });

                return {
                    name: item.name,
                    type: 'line',
                    smooth: true,
                    showSymbol: true,
                    symbol: 'circle',
                    symbolSize: 5,
                    data: points,
                    itemStyle: {
                        color: '#ffffff',
                        borderColor: item.color || '#4f86e8',
                        borderWidth: 2
                    },
                    lineStyle: {
                        color: item.color || '#4f86e8',
                        width: 2
                    }
                };
            });

            chart.setOption({
                backgroundColor: '#ffffff',
                tooltip: {
                    trigger: 'axis',
                    confine: true,
                    backgroundColor: 'rgba(15, 23, 42, 0.92)',
                    borderWidth: 0,
                    padding: [8, 10],
                    textStyle: {
                        color: '#ffffff',
                        fontSize: 12,
                        lineHeight: 18,
                    },
                    axisPointer: {
                        type: 'line',
                        lineStyle: {
                            color: '#94a3b8',
                            type: 'dashed'
                        }
                    },
                    // 自定义 tooltip 内容：先显示日期，再按 series 逐行显示数值
                    formatter: function (params) {
                        if (!Array.isArray(params) || params.length === 0) return '';
                        const dateLabel = params[0].axisValue || '';
                        const unit = resolveTooltipUnit(recordType);
                        const rows = params.map(function (item) {
                            const dataItem = item.data || {};
                            let displayValue = '0';
                            if (dataItem && typeof dataItem === 'object' && dataItem.is_no_task) {
                                displayValue = '无';
                            } else {
                                const rawValue = (
                                    dataItem && typeof dataItem === 'object' && dataItem.raw_value !== undefined
                                )
                                    ? dataItem.raw_value
                                    : (Array.isArray(item.value) ? item.value[0] : item.value);
                                const numericValue = Number(rawValue);
                                displayValue = Number.isFinite(numericValue) ? String(numericValue) : '0';
                            }
                            const valueWithUnit = displayValue === '无' ? '无' : (displayValue + unit);
                            return item.marker + item.seriesName + ': ' + valueWithUnit;
                        });
                        return [dateLabel].concat(rows).join('<br/>');
                    },
                    // 自定义 tooltip 位置：优先显示在点击点右侧，不够空间则切到左侧
                    position: function (point, params, dom, rect, size) {
                        const x = point[0];
                        const y = point[1];
                        const boxWidth = size.contentSize[0];
                        const boxHeight = size.contentSize[1];
                        const viewWidth = size.viewSize[0];
                        const viewHeight = size.viewSize[1];
                        const gap = 12;

                        let left = x + gap;
                        if (left + boxWidth > viewWidth) {
                            left = x - boxWidth - gap;
                        }
                        if (left < 0) {
                            left = 0;
                        }

                        let top = y - boxHeight / 2;
                        if (top + boxHeight > viewHeight) {
                            top = viewHeight - boxHeight;
                        }
                        if (top < 0) {
                            top = 0;
                        }

                        return [left, top];
                    }
                },
                legend: {
                    show: series.length > 1,
                    top: 0,
                    right: 8,
                    orient: 'horizontal'
                },
                grid: {
                    left: 14,
                    right: showSlider ? 56 : 20,
                    top: 42,
                    bottom: 20,
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    position: 'top',
                    min: 0,
                    max: xMax,
                    splitNumber: 5,
                    axisLine: { lineStyle: { color: '#cbd5e1' } },
                    axisTick: { show: true },
                    axisLabel: {
                        color: '#64748b',
                        fontSize: 11,
                        rotate: 90,
                        margin: 16,
                        hideOverlap: false,
                        align: 'right',
                        verticalAlign: 'middle'
                    },
                    splitLine: {
                        show: true,
                        lineStyle: { color: '#d1d5db' }
                    }
                },
                yAxis: {
                    type: 'category',
                    data: dates,
                    inverse: true,
                    axisLine: { lineStyle: { color: '#cbd5e1' } },
                    axisLabel: {
                        color: '#475569',
                        fontSize: 12,
                        interval: 0,
                        hideOverlap: false,
                        margin: 16,
                        rotate: -90
                    },
                    splitLine: { show: false }
                },
                dataZoom: [
                    {
                        type: 'inside',
                        yAxisIndex: 0,
                        filterMode: 'none',
                        startValue: 0,
                        endValue: endValue,
                        zoomOnMouseWheel: false,
                        moveOnMouseMove: true,
                        moveOnMouseWheel: true
                    },
                    {
                        type: 'slider',
                        yAxisIndex: 0,
                        filterMode: 'none',
                        show: showSlider,
                        right: 8,
                        top: series.length > 1 ? 108 : 92,
                        bottom: 20,
                        width: 12,
                        startValue: 0,
                        endValue: endValue,
                        showDetail: false,
                        borderColor: '#e2e8f0',
                        fillerColor: 'rgba(79, 134, 232, 0.18)',
                        backgroundColor: '#f1f5f9'
                    }
                ],
                series: series
            }, true);

            setTimeout(function () {
                chart.resize();
            }, 0);
        };

        if (!window.__healthRecordChartResizeBound) {
            window.__healthRecordChartResizeBound = true;
            window.addEventListener('resize', function () {
                const chartDom = document.getElementById('health-record-line-chart');
                if (!chartDom || typeof echarts === 'undefined') return;
                const chart = echarts.getInstanceByDom(chartDom);
                if (chart) chart.resize();
            });
        }
    })();
</script>
