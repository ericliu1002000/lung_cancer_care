{% extends "layouts/base_portal.html" %}
{% load static %}

{% block title %}医患咨询{% endblock %}

{% block extra_head %}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
    /* Mobile Layout Fix: Lock html/body to viewport to prevent keyboard from breaking layout */
    html, body {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        touch-action: none; /* Prevent browser zoom/pan */
    }
</style>
{% endblock %}

{% block body %}
<div x-data="patientChatWidget()" x-init="init()" class="flex flex-col w-full h-full absolute inset-0 bg-slate-50 overflow-hidden">
    <!-- 1. Top Header -->
    <div class="fixed top-0 left-0 right-0 h-12 bg-white/90 backdrop-blur-md shadow-sm z-50 flex items-center justify-between px-4 border-b border-slate-100">
        <a href="javascript:history.back()" class="w-8 h-8 flex items-center justify-center text-slate-600 active:bg-slate-100 rounded-full transition">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h1 class="text-base font-bold text-slate-800">
            {{ chat_title }}
        </h1>
        <div class="w-8"></div>
    </div>

    <!-- Error State -->
    <div x-show="showNoStudioError" class="flex flex-col items-center justify-center h-full p-6 text-center" style="display: none;">
        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-slate-400">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h3 class="text-lg font-bold text-slate-800 mb-2">无法发起咨询</h3>
        <p class="text-slate-500 text-sm mb-6">您当前暂未分配管理医生或工作室，请联系客服或管理员进行绑定。</p>
        <a href="{% url 'web_patient:patient_home' %}" class="px-6 py-2.5 bg-blue-600 text-white rounded-full font-bold text-sm shadow-md active:scale-95 transition">
            返回首页
        </a>
    </div>

    <!-- 2. Chat Content Area -->
    <div x-show="!showNoStudioError" x-ref="chatContainer" class="flex-1 overflow-y-auto pt-16 pb-20 px-4 space-y-5 -webkit-overflow-scrolling-touch" @click="showMedia = false" @touchstart="handleScrollIntent()" @wheel="handleScrollIntent()" @mousedown="handleScrollIntent()" @scroll="handleScroll()">
        <template x-if="loading && messages.length === 0">
            <div class="flex justify-center py-4">
                <span class="text-slate-400 text-sm">加载中...</span>
            </div>
        </template>

        <div x-show="hasNext" class="flex justify-center py-1" style="display: none;">
            <button type="button" @click.stop="loadOlder()" class="px-4 py-1.5 rounded-full bg-white text-xs font-medium text-slate-500 shadow-sm border border-slate-200 active:bg-slate-50 disabled:opacity-60" :disabled="loadingOlder">
                <span x-show="!loadingOlder">加载更早消息</span>
                <span x-show="loadingOlder">加载中...</span>
            </button>
        </div>
        
        <template x-for="msg in messages" :key="msg.id">
            <div class="flex gap-3" :class="isSelf(msg) ? 'flex-row-reverse' : 'flex-row'">
                <!-- Avatar -->
                <div class="w-10 h-10 shrink-0 rounded-full bg-slate-200 overflow-hidden shadow-sm">
                    <img :src="isSelf(msg) ? getPatientAvatar(msg) : getDoctorAvatar(msg)" class="w-full h-full object-cover">
                </div>
                
                <!-- Content Bubble -->
                <div class="flex flex-col flex-1 min-w-0" :class="isSelf(msg) ? 'items-end' : 'items-start'">
                    <!-- Sender Name (Optional, for doctor side) -->
                    <template x-if="!isSelf(msg)">
                        <span class="text-[10px] text-slate-500 mb-1 ml-1" x-text="msg.sender_name || '医生'"></span>
                    </template>

                    <!-- Text Content -->
                    <template x-if="msg.content_type === 'text'">
                        <div class="max-w-full px-4 py-2.5 rounded-2xl shadow-sm border border-black/5"
                             :class="isSelf(msg) ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none'">
                            <p class="whitespace-pre-wrap break-words text-[15px] leading-6" x-text="msg.text_content"></p>
                        </div>
                    </template>

                    <!-- Image Content -->
                    <template x-if="msg.content_type === 'image'">
                        <img :src="msg.image_url" class="max-w-full rounded-lg cursor-pointer" @load="handleMessageImageLoad(msg)" @click="previewImage(msg.image_url)">
                    </template>

                    <!-- Time -->
                    <span class="text-[10px] text-slate-400 mt-1 px-1" x-text="msg.created_at_display || formatTime(msg.created_at)"></span>
                    
                    <!-- Status -->
                    <template x-if="msg.sender_id == currentUserId && msg.id < 0">
                        <div class="mt-1 mr-1">
                             <span class="text-xs text-slate-400">发送中...</span>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <button x-show="showNewMessageNotice" @click="scrollToLatest()" class="fixed right-4 bottom-20 z-50 px-3 py-1.5 rounded-full bg-blue-600 text-white text-xs font-semibold shadow-lg shadow-blue-200 active:scale-95 transition" style="display: none;">
        有新消息
    </button>

    <!-- 3. Bottom Input Area -->
    <div x-show="!showNoStudioError" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 z-50 transition-all duration-300">
        <div class="flex items-end gap-2 p-3">
            <!-- Plus Button -->
            <button @click="showMedia = !showMedia" class="w-9 h-9 shrink-0 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center active:bg-slate-200 transition mb-0.5">
                <svg class="w-6 h-6 transition-transform duration-300" :class="showMedia ? 'rotate-45' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
            </button>

            <!-- Text Input -->
            <div class="flex-1 bg-slate-100 rounded-2xl px-3 py-2 min-h-[40px] max-h-[120px] overflow-y-auto flex items-center">
                <textarea x-model="inputText" x-ref="input" rows="1" class="w-full bg-transparent border-0 focus:ring-0 outline-none p-0 text-sm text-slate-800 resize-none leading-5 max-h-[100px]" placeholder="请输入咨询内容..." @input="autoResize" @focus="showMedia = false"></textarea>
            </div>

            <!-- Send Button -->
            <button @click="sendMessage()"
                    class="w-14 h-9 shrink-0 text-sm font-bold rounded-xl transition flex items-center justify-center mb-0.5"
                    :class="isSendDisabled() ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' : 'bg-blue-600 text-white shadow-md shadow-blue-200 active:scale-95'"
                    :disabled="isSendDisabled()">
                <span x-text="isSendingText ? '发送中' : '发送'"></span>
            </button>
        </div>

        <!-- Media Menu -->
        <div x-show="showMedia" x-transition.origin.top class="bg-slate-50 border-t border-slate-100 overflow-hidden">
            <div class="grid grid-cols-4 gap-4 p-4">
                <!-- Image Upload -->
                <button type="button" class="flex flex-col items-center gap-2 transition"
                        :class="isUploadingImage ? 'opacity-60 cursor-not-allowed' : ''"
                        :disabled="isUploadingImage"
                        @click="openImagePicker()">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-200 active:bg-slate-50">
                        <svg class="w-7 h-7 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-xs text-slate-500" x-text="isUploadingImage ? '上传中' : '图片'"></span>
                </button>
                <input type="file" x-ref="fileInput" class="hidden" accept="image/jpeg,image/png,image/webp" @change="uploadImage($event)">
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div x-show="previewUrl" class="fixed inset-0 z-[100] bg-black flex items-center justify-center" @click="previewUrl = null" style="display: none;">
        <div class="absolute top-4 right-4 z-10">
            <button class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white backdrop-blur-md">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="w-full max-h-screen p-2 flex items-center justify-center">
            <img :src="previewUrl" class="max-w-full max-h-[90vh] object-contain rounded-lg" @click.stop>
        </div>
    </div>
</div>

<script>
    function patientChatWidget() {
        return {
            messages: [],
            inputText: '',
            showMedia: false,
            showNoStudioError: false,
            loading: false,
            isSendingText: false,
            isUploadingImage: false,
            previewUrl: null,
            currentUserId: {{ request.user.id|default:0 }},
            currentUserDisplayName: "{{ current_user_display_name|default:''|escapejs }}",
            fallbackPatientAvatar: "{% static 'paitent.png' %}",
            currentUserAvatar: "",
            defaultDoctorAvatar: "{% static 'doctor.png' %}",
            lastMessageId: null,
            pollTimer: null,
            pollBaseDelay: 5000,
            pollMaxDelay: 30000,
            pollFailureCount: 0,
            isPolling: false,
            handleVisibilityChange: null,
            cleanupPageListeners: null,
            allowedImageTypes: ['image/jpeg', 'image/png', 'image/webp'],
            maxImageSizeBytes: 10 * 1024 * 1024,
            hasNext: false,
            nextCursor: '',
            loadingOlder: false,
            showNewMessageNotice: false,
            pendingReadMessageId: null,
            userAtBottom: true,
            shouldStickToBottom: true,
            isAutoScrolling: false,
            userScrollIntent: false,
            scrollIntentTimer: null,
            scrollTimers: [],
            currentRole: '{{ is_family|yesno:"family,patient" }}',
            roleLocked: true,

            init() {
                this.currentUserAvatar = this.buildAvatarByName(this.currentUserDisplayName, this.fallbackPatientAvatar);
                this.handleVisibilityChange = () => {
                    if (document.hidden) {
                        this.stopPolling();
                        return;
                    }
                    this.pollFailureCount = 0;
                    this.pollMessages();
                };
                this.cleanupPageListeners = () => this.destroy();
                document.addEventListener('visibilitychange', this.handleVisibilityChange);
                window.addEventListener('pagehide', this.cleanupPageListeners);
                this.loadMessages().finally(() => this.startPolling());
            },

            destroy() {
                this.stopPolling();
                this.clearScrollTimers();
                if (this.scrollIntentTimer) {
                    clearTimeout(this.scrollIntentTimer);
                    this.scrollIntentTimer = null;
                }
                if (this.handleVisibilityChange) {
                    document.removeEventListener('visibilitychange', this.handleVisibilityChange);
                }
                if (this.cleanupPageListeners) {
                    window.removeEventListener('pagehide', this.cleanupPageListeners);
                }
            },

            isSelf(msg) {
                if (!msg) return false;
                if (msg.is_patient_side === true) return true;
                if (msg.sender_id && this.currentUserId && msg.sender_id === this.currentUserId) return true;
                return false;
            },

            getDoctorAvatar(msg) {
                // Future: Use real doctor avatar if available in message payload
                return this.defaultDoctorAvatar;
            },

            getPatientAvatar(msg) {
                if (msg && (msg.sender_role === 1 || msg.sender_role === 2)) {
                    return this.buildAvatarByName(msg.sender_name, this.fallbackPatientAvatar);
                }
                return this.currentUserAvatar || this.fallbackPatientAvatar;
            },

            buildAvatarByName(name, fallback) {
                const cleaned = (name || '').trim();
                if (!cleaned) return fallback;
                return `https://ui-avatars.com/api/?name=${encodeURIComponent(cleaned)}&background=3b82f6&color=fff`;
            },

            startPolling() {
                this.scheduleNextPoll(this.pollBaseDelay);
            },

            stopPolling() {
                if (this.pollTimer) {
                    clearTimeout(this.pollTimer);
                    this.pollTimer = null;
                }
            },

            scheduleNextPoll(delay = this.pollBaseDelay) {
                this.stopPolling();
                if (document.hidden || this.showNoStudioError) return;
                this.pollTimer = setTimeout(() => this.pollMessages(), delay);
            },

            async pollMessages() {
                if (this.isPolling || document.hidden || this.showNoStudioError) return;
                this.isPolling = true;
                const success = await this.loadMessages(true);
                this.isPolling = false;

                if (success) {
                    this.pollFailureCount = 0;
                } else {
                    this.pollFailureCount += 1;
                }
                const delay = success
                    ? this.pollBaseDelay
                    : Math.min(this.pollMaxDelay, this.pollBaseDelay * Math.pow(2, this.pollFailureCount));
                this.scheduleNextPoll(delay);
            },

            async loadMessages(isPoll = false) {
                if (!isPoll) this.loading = true;
                
                try {
                    let url = "{% url 'web_patient:chat_api_list_messages' %}";
                    if (isPoll && this.lastMessageId) {
                        url += `?after_id=${this.lastMessageId}`;
                    }

                    const res = await fetch(url);
                    const data = await res.json();
                    
                    if (res.status === 400 && data.message && data.message.includes("工作室")) {
                        this.showNoStudioError = true;
                        this.loading = false;
                        this.stopPolling();
                        return false;
                    }

                    if (data.status === 'success') {
                        this.showNoStudioError = false;
                        if (isPoll) {
                            if (data.messages.length > 0) {
                                const shouldStickToBottom = this.shouldStickToBottom || this.userAtBottom || this.isNearBottom();
                                // Filter out duplicates just in case (e.g. optimistic updates)
                                const newMsgs = data.messages.filter(nm => !this.messages.some(m => m.id === nm.id));
                                if (newMsgs.length > 0) {
                                    this.messages = [...this.messages, ...newMsgs];
                                    const latestId = newMsgs[newMsgs.length - 1].id;
                                    this.lastMessageId = latestId;
                                    if (shouldStickToBottom) {
                                        this.scrollToBottom();
                                        this.markRead(latestId);
                                    } else {
                                        this.shouldStickToBottom = false;
                                        this.pendingReadMessageId = latestId;
                                        this.showNewMessageNotice = true;
                                    }
                                }
                            }
                        } else {
                            this.messages = Array.isArray(data.messages) ? data.messages : [];
                            this.hasNext = !!data.has_next;
                            this.nextCursor = data.next_cursor || '';
                            if (this.messages.length > 0) {
                                const latestId = this.messages[this.messages.length - 1].id;
                                this.lastMessageId = latestId;
                                this.scrollToBottom();
                                this.markRead(latestId);
                            }
                        }
                        return true;
                    }
                    return false;
                } catch (e) {
                    console.error('Failed to load messages', e);
                    return false;
                } finally {
                    this.loading = false;
                }
            },

            async loadOlder() {
                if (this.loadingOlder || !this.hasNext || !this.nextCursor) return;
                this.loadingOlder = true;
                const container = this.$refs.chatContainer;
                const previousScrollHeight = container ? container.scrollHeight : 0;
                const previousScrollTop = container ? container.scrollTop : 0;

                try {
                    const url = `{% url 'web_patient:chat_api_list_messages' %}?before_id=${encodeURIComponent(this.nextCursor)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.status !== 'success') return;

                    const incoming = Array.isArray(data.messages) ? data.messages : [];
                    const olderMsgs = incoming.filter(nm => !this.messages.some(m => m.id === nm.id));
                    if (olderMsgs.length > 0) {
                        this.messages = [...olderMsgs, ...this.messages];
                    }
                    this.hasNext = !!data.has_next;
                    this.nextCursor = data.next_cursor || '';

                    this.$nextTick(() => {
                        if (!container) return;
                        const nextScrollHeight = container.scrollHeight;
                        container.scrollTop = previousScrollTop + (nextScrollHeight - previousScrollHeight);
                    });
                } catch (e) {
                    console.error('Failed to load older messages', e);
                } finally {
                    this.loadingOlder = false;
                }
            },

            async sendMessage() {
                if (this.isSendDisabled()) return;
                const originalText = String(this.inputText || '');
                const text = originalText.trim();
                if (!this.currentRole) {
                    alert('身份未确定，发送失败');
                    return;
                }
                this.isSendingText = true;

                // Optimistic update
                const tempId = -Date.now();
                const tempMsg = {
                    id: tempId,
                    sender_id: this.currentUserId,
                    sender_role: this.currentRole === 'family' ? 2 : 1,
                    sender_name: this.currentUserDisplayName,
                    is_patient_side: true,
                    content_type: 'text',
                    text_content: text,
                    created_at: new Date().toISOString(),
                    status: 'sending'
                };
                
                this.messages.push(tempMsg);
                this.inputText = '';
                this.autoResize(); // Reset height
                this.scrollToBottom();

                try {
                    const res = await fetch("{% url 'web_patient:chat_api_send_text' %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ content: text, role: this.currentRole })
                    });
                    const data = await res.json();
                    
                    if (data.status === 'success') {
                        // Replace temp message with real one or reload
                        // Simplest is to reload or update ID. 
                        // Since polling will pick it up, we can just let polling handle it or update local ID.
                        // Ideally, we update the temp message with real ID.
                        const idx = this.messages.findIndex(m => m.id === tempId);
                        if (idx !== -1) {
                            this.messages[idx].id = data.message.id;
                            this.messages[idx].created_at = data.message.created_at;
                            this.lastMessageId = Math.max(this.lastMessageId || 0, data.message.id);
                        }
                    } else {
                        // Mark as failed
                         const idx = this.messages.findIndex(m => m.id === tempId);
                         if (idx !== -1) this.messages.splice(idx, 1); // Remove for now or show error
                         this.inputText = originalText;
                         this.$nextTick(() => this.autoResize());
                         alert('发送失败: ' + data.message);
                    }
                } catch (e) {
                    console.error('Send failed', e);
                    const idx = this.messages.findIndex(m => m.id === tempId);
                    if (idx !== -1) this.messages.splice(idx, 1);
                    this.inputText = originalText;
                    this.$nextTick(() => this.autoResize());
                    alert('发送失败，请检查网络');
                } finally {
                    this.isSendingText = false;
                }
            },

            async uploadImage(event) {
                const file = event.target.files && event.target.files[0];
                if (!file) {
                    this.resetImageInput(event);
                    return;
                }
                if (this.isUploadingImage) {
                    this.resetImageInput(event);
                    return;
                }
                if (!this.currentRole) {
                    alert('身份未确定，发送失败');
                    this.resetImageInput(event);
                    return;
                }
                const validationMessage = this.validateImageFile(file);
                if (validationMessage) {
                    alert(validationMessage);
                    this.resetImageInput(event);
                    return;
                }

                this.isUploadingImage = true;
                const localPreviewUrl = URL.createObjectURL(file);
                const formData = new FormData();
                formData.append('image', file);
                formData.append('role', this.currentRole);

                // Optimistic update (show placeholder)
                 const tempId = -Date.now();
                 const tempMsg = {
                    id: tempId,
                    sender_id: this.currentUserId,
                    sender_role: this.currentRole === 'family' ? 2 : 1,
                    sender_name: this.currentUserDisplayName,
                    is_patient_side: true,
                    content_type: 'image',
                    image_url: localPreviewUrl, // Local preview
                    created_at: new Date().toISOString(),
                    status: 'sending'
                };
                this.messages.push(tempMsg);
                this.showMedia = false;
                this.scrollToBottom();

                try {
                    const res = await fetch("{% url 'web_patient:chat_api_upload_image' %}", {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: formData
                    });
                    const data = await res.json();
                    if (data.status === 'success') {
                         const idx = this.messages.findIndex(m => m.id === tempId);
                        if (idx !== -1) {
                            this.messages[idx].id = data.message.id;
                            this.messages[idx].image_url = data.message.image_url; // Update with server URL
                            this.messages[idx].created_at = data.message.created_at;
                            this.lastMessageId = Math.max(this.lastMessageId || 0, data.message.id);
                        }
                        if (this.previewUrl === localPreviewUrl) {
                            this.previewUrl = data.message.image_url;
                        }
                    } else {
                        alert('上传失败: ' + data.message);
                         const idx = this.messages.findIndex(m => m.id === tempId);
                         if (idx !== -1) this.messages.splice(idx, 1);
                         if (this.previewUrl === localPreviewUrl) {
                             this.previewUrl = null;
                         }
                    }
                } catch (e) {
                     console.error('Upload failed', e);
                     const idx = this.messages.findIndex(m => m.id === tempId);
                     if (idx !== -1) this.messages.splice(idx, 1);
                     if (this.previewUrl === localPreviewUrl) {
                         this.previewUrl = null;
                     }
                     alert('上传失败');
                } finally {
                    URL.revokeObjectURL(localPreviewUrl);
                    this.isUploadingImage = false;
                    this.resetImageInput(event);
                }
            },
            
            async markRead(msgId) {
                if (!msgId) return;
                try {
                    await fetch("{% url 'web_patient:chat_api_mark_read' %}", {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ last_message_id: msgId })
                    });
                } catch (e) {
                    console.error('Mark read failed', e);
                }
            },

            autoResize() {
                const el = this.$refs.input;
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
                if (!this.inputText) el.style.height = 'auto';
            },

            hasSendableText() {
                return !!String(this.inputText || '').trim();
            },

            isSendDisabled() {
                return this.isSendingText || !this.hasSendableText();
            },

            openImagePicker() {
                if (this.isUploadingImage) return;
                if (this.$refs.fileInput) {
                    this.$refs.fileInput.click();
                }
            },

            resetImageInput(event) {
                const input = event && event.target ? event.target : this.$refs.fileInput;
                if (input) {
                    input.value = '';
                }
            },

            validateImageFile(file) {
                if (!this.allowedImageTypes.includes(file.type)) {
                    return '请上传 JPG、PNG 或 WebP 格式图片';
                }
                if (file.size > this.maxImageSizeBytes) {
                    return '单张图片不能超过 10MB';
                }
                return '';
            },

            isNearBottom(threshold = 80) {
                const el = this.$refs.chatContainer;
                if (!el) return true;
                return el.scrollHeight - el.scrollTop - el.clientHeight <= threshold;
            },

            handleScrollIntent() {
                this.userScrollIntent = true;
                if (this.scrollIntentTimer) {
                    clearTimeout(this.scrollIntentTimer);
                }
                this.scrollIntentTimer = setTimeout(() => {
                    this.userScrollIntent = false;
                }, 500);
            },

            handleScroll() {
                if (this.isAutoScrolling) return;

                const atBottom = this.isNearBottom();
                if (!atBottom && this.shouldStickToBottom && !this.userScrollIntent) {
                    this.scrollToBottom();
                    return;
                }

                this.userAtBottom = atBottom;
                this.shouldStickToBottom = atBottom;
                if (!atBottom) return;

                this.showNewMessageNotice = false;
                if (this.pendingReadMessageId) {
                    this.markRead(this.pendingReadMessageId);
                    this.pendingReadMessageId = null;
                }
            },

            getLatestStableMessageId() {
                for (let i = this.messages.length - 1; i >= 0; i -= 1) {
                    const id = this.messages[i].id;
                    if (typeof id === 'number' && id > 0) return id;
                    if (typeof id === 'string' && /^\d+$/.test(id)) return parseInt(id, 10);
                }
                return null;
            },

            clearScrollTimers() {
                this.scrollTimers.forEach(timer => clearTimeout(timer));
                this.scrollTimers = [];
            },

            scrollChatToBottomNow() {
                const el = this.$refs.chatContainer;
                if (!el) return;
                el.scrollTop = el.scrollHeight;
            },

            isLatestMessage(msg) {
                if (!msg || this.messages.length === 0) return false;
                const latest = this.messages[this.messages.length - 1];
                return latest === msg || String(latest.id) === String(msg.id);
            },

            scrollToBottom(keepStick = true) {
                if (keepStick) {
                    this.shouldStickToBottom = true;
                }
                this.isAutoScrolling = true;
                this.clearScrollTimers();

                this.$nextTick(() => {
                    this.scrollChatToBottomNow();
                    const raf = window.requestAnimationFrame || ((callback) => setTimeout(callback, 16));
                    raf(() => this.scrollChatToBottomNow());
                    this.scrollTimers.push(setTimeout(() => this.scrollChatToBottomNow(), 80));
                    this.scrollTimers.push(setTimeout(() => {
                        this.scrollChatToBottomNow();
                        this.userAtBottom = true;
                        this.showNewMessageNotice = false;
                    }, 240));
                    this.scrollTimers.push(setTimeout(() => {
                        this.isAutoScrolling = false;
                        this.userAtBottom = this.isNearBottom();
                        this.shouldStickToBottom = this.userAtBottom;
                    }, 320));
                });
            },

            scrollToLatest() {
                this.scrollToBottom();
                const latestId = this.getLatestStableMessageId();
                if (latestId) {
                    this.pendingReadMessageId = null;
                    this.markRead(latestId);
                }
            },

            handleMessageImageLoad(msg) {
                const latestImageShouldStick = this.isLatestMessage(msg) && (this.shouldStickToBottom || this.userAtBottom);
                if (latestImageShouldStick || this.shouldStickToBottom || this.userAtBottom || this.isNearBottom(180)) {
                    this.scrollToBottom();
                }
            },

            formatTime(isoStr) {
                if (!isoStr) return '';
                const date = new Date(isoStr);
                const pad = (n) => String(n).padStart(2, '0');
                const yyyy = date.getFullYear();
                const mm = pad(date.getMonth() + 1);
                const dd = pad(date.getDate());
                const hh = pad(date.getHours());
                const min = pad(date.getMinutes());
                return `${yyyy}-${mm}-${dd} ${hh}:${min}`;
            },
            
            previewImage(url) {
                this.previewUrl = url;
            }
        }
    }
</script>
